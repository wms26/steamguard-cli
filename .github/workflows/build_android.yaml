name: Build Android aarch64

on:
  push:
    branches: [master]
    tags:
      - 'v*'
  pull_request:
    branches: [master]
  workflow_dispatch:  # 允许手动触发

env:
  CARGO_TERM_COLOR: always

jobs:
  build-android:
    name: Build Android arm64-v8a
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install --profile minimal
          rustup target add aarch64-linux-android

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v0-android-aarch64

      - name: Install Cross
        uses: baptiste0928/cargo-install@v2
        with:
          crate: cross

      - name: Build for Android
        run: |
          cross build --release \
            --bin steamguard \
            --target aarch64-linux-android \
            --no-default-features \
            --features qr

      - name: Strip binary (optional, 减小体积)
        run: |
          # 使用 NDK 自带的 strip（cross 容器中有）
          # 如果 cross 容器不可用，可以用 llvm-strip
          rustup component add llvm-tools-preview
          ~/.rustup/toolchains/stable-x86_64-unknown-linux-gnu/lib/rustlib/x86_64-unknown-linux-gnu/bin/llvm-strip \
            target/aarch64-linux-android/release/steamguard

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: steamguard-android-arm64-v8a
          path: target/aarch64-linux-android/release/steamguard
          if-no-files-found: error
